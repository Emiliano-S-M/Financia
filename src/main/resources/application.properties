spring.application.name=Financia
spring.main.headless=false

# Conexión a base de datos H2 en archivo local

 app.storage.path=${user.home}/Financia
 spring.datasource.url=jdbc:h2:file:${app.storage.path}/financiaDB;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
# spring.datasource.url=jdbc:h2:file:./financiaDB;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver

# Configuración JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Desactivar servidor web embebido (Tomcat)
spring.main.web-application-type=none

